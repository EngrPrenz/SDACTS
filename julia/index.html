<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PRODUCT MANAGEMENT SYSTEM</h1>
            <p class="subtitle">Simple Inventory Management</p>
            <div style="position:absolute;top:20px;right:20px;">
                <button onclick="logout()" style="background:#fff;color:#000;border:2px solid #000;padding:8px 18px;font-weight:bold;font-size:13px;cursor:pointer;letter-spacing:0.5px;">LOGOUT</button>
            </div>
        </header>

        <div id="message" class="message"></div>

        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalProducts">0</div>
                <div class="stat-label">Total Products</div>
            </div>
        </div>

        <!-- Add Product Section -->
        <div class="section">
            <h2>Add New Product</h2>
            <form id="addForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price</label>
                    <input type="number" id="productPrice" name="price" step="0.01" required>
                </div>
                <button type="submit">Add Product</button>
                <button type="reset" class="secondary">Clear</button>
            </form>
        </div>

        <!-- Product List Section -->
        <div class="section">
            <h2>Product List</h2>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button onclick="searchProducts()" class="secondary">Search</button>
                <button onclick="loadProducts()" class="secondary">Show All</button>
            </div>

            <table id="productTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTable">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close-modal" onclick="closeEditModal()">&times;</span>
                Edit Product
            </div>
            <form id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label for="editProductName">Product Name</label>
                    <input type="text" id="editProductName" required>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Price</label>
                    <input type="number" id="editProductPrice" step="0.01" required>
                </div>
                <button type="submit">Update Product</button>
                <button type="button" class="secondary" onclick="closeEditModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
